<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Screen</title>
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
   

  <!-- idle screen displayed when app is inactive -->
  <div id="idleView" class="container">
    <div class="idle-content">
      <div class="light-bg"></div>
      <img src="src/assets/icons/Olympia-icon.svg" alt="Gym Screen Logo" class="olympia-icon">
      <div class="title text-xl">OLYMPIA</div>
      <div class="subtitle text-md">peak performance await</div>
      <div class="idle-text text-md">tap to start</div>
      </div>
      
    </div>
  </div>

  <!-- main menu used to select which view to show -->
  <div class="light-bg"></div>
  <div class="toolBar hidden" id="navigation">
    <button id="navShowHome" class="nav-btn">
      <i data-lucide="home" class="nav-icon"></i>
      <div class="nav-text">בית</div>
    </button>

    <button id="navShowExercises" class="nav-btn">
      <i data-lucide="dumbbell" class="nav-icon"></i>
      <div class="nav-text">תרגילים</div>
    </button>
    <button id="navShowGymMap" class="nav-btn">
      <i data-lucide="map-pin" class="nav-icon"></i>
      <div class="nav-text">מפת כושר</div>
    </button>

  </div>
  <div class="menu hidden" id="menu">
    <img src="src/assets/icons/Olympia-icon.svg" alt="Gym Screen Logo" class="olympia-icon">
    <div class="title text-xl">OLYMPIA</div>
    <button id="menuShowExercises">
      <i data-lucide="dumbbell" class="nav-icon"></i>
     <div class="title text-lg"> מאגר תרגילים</div>
     <div class="subtitle text-md">מצא את התרגיל המושלם עבורך</div>
    </button>
    <button id="menuShowGymMap">
      <i data-lucide="map-pin" class="nav-icon"></i>
      <div class="title text-lg"> מפת חדר כושר</div>
      <div class="subtitle text-md">נווט במכון ומצא את המתקן שלך</div>
    </button>
    
  </div>

  <!-- exercise carousel + details view (hidden until chosen) -->
  <div id="exerciseView" class="container hidden exerciseView">

    <button class="back-btn" id="backFromExercises">
      <img src="src/assets/icons/back-btn.svg" alt="back" class="back-icon"></img>
    </button>


    <!-- back carousel button - hidden until a card is clicked -->
    <button class="back-btn" id="backFromCarousel" style="display: none;">
      <img src="src/assets/icons/back-btn.svg" alt="back" class="back-icon"></img>
    </button>

    <!-- 6 category carousels - all shown by default -->
    <h3 class="carousel-title">חזה</h3>
    <div class="carousel" id="carousel-1" data-category="חזה"></div>
    
    <h3 class="carousel-title">רגליים</h3>
    <div class="carousel" id="carousel-2" data-category="רגליים"></div>
    
    <h3 class="carousel-title">גב</h3>
    <div class="carousel" id="carousel-3" data-category="גב"></div>
    
    <h3 class="carousel-title">יד קדמית ואחורית</h3>
    <div class="carousel" id="carousel-4" data-category="יד קדמית ואחורית"></div>
    
    <h3 class="carousel-title">כתפיים</h3>
    <div class="carousel" id="carousel-5" data-category="כתפיים"></div>
    
    <h3 class="carousel-title">בטן</h3>
    <div class="carousel" id="carousel-6" data-category="בטן"></div>

    <h3 class="carousel-title">אירובי</h3>
    <div class="carousel" id="carousel-7" data-category="אירובי"></div>

    <!-- אזור פרטים -->
    <div class="details hidden" id="exerciseDetails">
      <!-- preview iframe and textual details -->
      <h2 id="exerciseTitle">בחר תרגיל</h2>
      <iframe id="exerciseFrame" title="תרגיל - תצוגה מקדימה"></iframe>

      <div class="info-box" aria-labelledby="instructions-heading">
        <h3 id="instructions-heading">הוראות ביצוע</h3>
        <div id="exerciseInstructions" class="info-content"></div>
      </div>

      <div class="info-box" aria-labelledby="mistakes-heading">
        <h3 id="mistakes-heading">טעויות נפוצות</h3>
        <div id="exerciseMistakes" class="info-content"></div>
      </div>
    </div>

  </div>

  <!-- gym map view (hidden until chosen) -->
  <div id="mapView" class="container hidden">
    <button class="back-btn" id="backFromMap">
      <img src="src/assets/icons/back-btn.svg" alt="back" class="back-icon"></img>
    </button>
    <!-- replace the src below with the desired map URL / embed code -->
    <iframe id="gymMapFrame" title="מפת חדר כושר" src="https://my.treedis.com/tour/547d8aec"></iframe>
  </div>
  
  <script src="src/js/script.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>
</html>
